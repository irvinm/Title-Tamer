<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import/Export Options</title>
    <link rel="stylesheet" href="../options/options.css"> <!-- Link to your CSS file -->
</head>

<body>
    <h1>Import/Export Options</h1>
    <p>Use the buttons below to export your current patterns to a file or import patterns from a file.</p>
    <div class="form-group2">
        <button type="button" id="export-button" class="add-pattern-button">Export Patterns</button>
        <input type="file" id="import-file" style="display: none;" />
        <button type="button" id="import-button" class="add-pattern-button">Import Patterns</button>
    </div>
    <dialog id="custom-alert">
        <div class="dialog-header">
            <img src="../icons/icon-dark.svg" class="icon-for-light" alt="" aria-hidden="true">
            <img src="../icons/icon-light.svg" class="icon-for-dark" alt="" aria-hidden="true">
            <span>Title Tamer</span>
        </div>
        <div class="dialog-body">
            <div id="custom-alert-message"></div>
            <div class="delete-modal-buttons">
                <button type="button" id="custom-alert-ok" class="add-pattern-button">OK</button>
            </div>
        </div>
    </dialog>
    <script src="../lib/import-export-utils.js"></script>
    <script src="import-export.js"></script>
</body>

</html>
